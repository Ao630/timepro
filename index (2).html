<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#0a0a0f" />
  <meta name="description" content="Timepro - 勉強効率化タイマーアプリ" />
  <title>Timepro</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <!-- Canvas for dot rain animation -->
  <canvas id="bgCanvas"></canvas>

  <!-- Main app container -->
  <div id="app">

    <!-- Header -->
    <header class="app-header">
      <div class="logo">
        <span class="logo-icon">⬡</span>
        <span class="logo-text">TIMEPRO</span>
      </div>
      <div class="header-stats">
        <div class="stat-chip">
          <span class="stat-label">TODAY</span>
          <span class="stat-value" id="headerTodayTime">0h 0m</span>
        </div>
        <div class="stat-chip">
          <span class="stat-label">POMODORO</span>
          <span class="stat-value" id="headerPomCount">0</span>
        </div>
      </div>
    </header>

    <!-- Tab Views -->
    <main class="main-content">

      <!-- ===== TIMER TAB ===== -->
      <section id="tab-timer" class="tab-content active">
        <div class="timer-wrapper">
          <!-- Progress ring -->
          <div class="progress-ring-container">
            <svg class="progress-ring" viewBox="0 0 280 280">
              <circle class="ring-bg" cx="140" cy="140" r="120" />
              <circle class="ring-fill" id="timerRing" cx="140" cy="140" r="120" />
            </svg>
            <div class="timer-center">
              <div class="timer-display" id="timerDisplay">00:00</div>
              <div class="timer-label" id="timerLabel">準備完了</div>
            </div>
          </div>

          <!-- Preset buttons -->
          <div class="preset-row">
            <button class="preset-btn" data-minutes="15">15分</button>
            <button class="preset-btn" data-minutes="30">30分</button>
            <button class="preset-btn" data-minutes="60">60分</button>
          </div>

          <!-- Custom time input -->
          <div class="time-input-row">
            <div class="time-input-group">
              <input type="number" id="inputMin" class="time-input" placeholder="00" min="0" max="99" value="25" />
              <label class="time-input-label">分</label>
            </div>
            <div class="time-separator">:</div>
            <div class="time-input-group">
              <input type="number" id="inputSec" class="time-input" placeholder="00" min="0" max="59" value="0" />
              <label class="time-input-label">秒</label>
            </div>
          </div>

          <!-- Controls -->
          <div class="controls-row">
            <button class="ctrl-btn ctrl-reset" id="timerResetBtn" title="リセット">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 .49-3.45"/></svg>
            </button>
            <button class="ctrl-btn ctrl-primary" id="timerStartBtn">
              <svg class="icon-play" width="28" height="28" viewBox="0 0 24 24" fill="currentColor"><polygon points="5 3 19 12 5 21 5 3"/></svg>
              <svg class="icon-pause" width="28" height="28" viewBox="0 0 24 24" fill="currentColor" style="display:none"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>
            </button>
            <button class="ctrl-btn ctrl-log" id="timerLogBtn" title="ログ記録">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
            </button>
          </div>
        </div>
      </section>

      <!-- ===== POMODORO TAB ===== -->
      <section id="tab-pomodoro" class="tab-content">
        <div class="timer-wrapper">
          <div class="pom-status-bar">
            <div class="pom-state-badge" id="pomStateBadge">
              <span class="pom-state-dot"></span>
              <span id="pomStateText">作業中</span>
            </div>
            <div class="pom-counter">
              <span id="pomSessionCount">0</span> セッション完了
            </div>
          </div>

          <!-- Progress ring -->
          <div class="progress-ring-container">
            <svg class="progress-ring" viewBox="0 0 280 280">
              <circle class="ring-bg" cx="140" cy="140" r="120" />
              <circle class="ring-fill ring-pom" id="pomRing" cx="140" cy="140" r="120" />
            </svg>
            <div class="timer-center">
              <div class="timer-display" id="pomDisplay">25:00</div>
              <div class="timer-label" id="pomLabel">スタート待機中</div>
            </div>
          </div>

          <!-- Pomodoro session dots -->
          <div class="pom-dots" id="pomDots">
            <span class="pom-dot"></span>
            <span class="pom-dot"></span>
            <span class="pom-dot"></span>
            <span class="pom-dot"></span>
          </div>

          <!-- Settings -->
          <div class="pom-settings">
            <div class="pom-setting-item">
              <label class="pom-setting-label">作業時間</label>
              <div class="pom-setting-input-wrap">
                <button class="pom-adj-btn" data-target="pomWorkMin" data-delta="-1">−</button>
                <input type="number" id="pomWorkMin" class="pom-setting-input" value="25" min="1" max="60" />
                <button class="pom-adj-btn" data-target="pomWorkMin" data-delta="1">＋</button>
                <span class="pom-setting-unit">分</span>
              </div>
            </div>
            <div class="pom-setting-item">
              <label class="pom-setting-label">休憩時間</label>
              <div class="pom-setting-input-wrap">
                <button class="pom-adj-btn" data-target="pomBreakMin" data-delta="-1">−</button>
                <input type="number" id="pomBreakMin" class="pom-setting-input" value="5" min="1" max="30" />
                <button class="pom-adj-btn" data-target="pomBreakMin" data-delta="1">＋</button>
                <span class="pom-setting-unit">分</span>
              </div>
            </div>
          </div>

          <!-- Controls -->
          <div class="controls-row">
            <button class="ctrl-btn ctrl-reset" id="pomResetBtn" title="リセット">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 .49-3.45"/></svg>
            </button>
            <button class="ctrl-btn ctrl-primary" id="pomStartBtn">
              <svg class="icon-play" width="28" height="28" viewBox="0 0 24 24" fill="currentColor"><polygon points="5 3 19 12 5 21 5 3"/></svg>
              <svg class="icon-pause" width="28" height="28" viewBox="0 0 24 24" fill="currentColor" style="display:none"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>
            </button>
            <button class="ctrl-btn ctrl-skip" id="pomSkipBtn" title="スキップ">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><polygon points="5 4 15 12 5 20 5 4"/><line x1="19" y1="5" x2="19" y2="19" stroke="currentColor" stroke-width="2"/></svg>
            </button>
          </div>
        </div>
      </section>

      <!-- ===== STATS TAB ===== -->
      <section id="tab-stats" class="tab-content">
        <div class="stats-wrapper">
          <h2 class="stats-title">学習統計</h2>

          <div class="stats-grid">
            <div class="stats-card">
              <div class="stats-card-icon">⏱</div>
              <div class="stats-card-value" id="statTotalTime">0h 0m</div>
              <div class="stats-card-label">累計学習時間</div>
            </div>
            <div class="stats-card">
              <div class="stats-card-icon">📅</div>
              <div class="stats-card-value" id="statTodayTime">0h 0m</div>
              <div class="stats-card-label">本日の学習時間</div>
            </div>
            <div class="stats-card">
              <div class="stats-card-icon">🍅</div>
              <div class="stats-card-value" id="statPomCount">0</div>
              <div class="stats-card-label">ポモドーロ回数</div>
            </div>
            <div class="stats-card">
              <div class="stats-card-icon">🔥</div>
              <div class="stats-card-value" id="statStreak">0</div>
              <div class="stats-card-label">連続日数</div>
            </div>
          </div>

          <!-- Weekly bar chart -->
          <div class="weekly-chart">
            <div class="weekly-chart-title">今週の学習時間</div>
            <div class="weekly-bars" id="weeklyBars"></div>
            <div class="weekly-labels" id="weeklyLabels"></div>
          </div>

          <!-- Log history -->
          <div class="log-section">
            <div class="log-section-header">
              <span class="log-section-title">学習ログ</span>
              <button class="log-clear-btn" id="logClearBtn">全削除</button>
            </div>
            <div class="log-list" id="logList">
              <div class="log-empty">ログがありません</div>
            </div>
          </div>
        </div>
      </section>

    </main>

    <!-- Bottom nav -->
    <nav class="bottom-nav">
      <button class="nav-btn active" data-tab="timer">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
        <span>タイマー</span>
      </button>
      <button class="nav-btn" data-tab="pomodoro">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 8h1a4 4 0 0 1 0 8h-1"/><path d="M2 8h16v9a4 4 0 0 1-4 4H6a4 4 0 0 1-4-4V8z"/><line x1="6" y1="1" x2="6" y2="4"/><line x1="10" y1="1" x2="10" y2="4"/><line x1="14" y1="1" x2="14" y2="4"/></svg>
        <span>ポモドーロ</span>
      </button>
      <button class="nav-btn" data-tab="stats">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>
        <span>統計</span>
      </button>
    </nav>

  </div><!-- #app -->

  <!-- Log Modal -->
  <div class="modal-overlay" id="logModal">
    <div class="modal-card">
      <div class="modal-header">
        <div class="modal-title">セッション完了 🎉</div>
        <div class="modal-subtitle" id="modalSubtitle">お疲れ様でした！</div>
      </div>
      <div class="modal-duration" id="modalDuration"></div>
      <textarea class="modal-textarea" id="logInput" placeholder="何を勉強しましたか？（例：数学の微分積分、英単語100個...）" maxlength="200"></textarea>
      <div class="modal-actions">
        <button class="modal-btn modal-btn-skip" id="logSkipBtn">スキップ</button>
        <button class="modal-btn modal-btn-save" id="logSaveBtn">保存する</button>
      </div>
    </div>
  </div>

  <!-- Achievement overlay -->
  <div class="achievement-overlay" id="achievementOverlay">
    <div class="achievement-content">
      <div class="achievement-emoji" id="achievementEmoji">🎉</div>
      <div class="achievement-text" id="achievementText">完了！</div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
